title: "[Help Wanted] "
labels: ["help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Looking for contributors on a specific topic? Use this template to describe what help is needed
        and how someone can get started. This is the preferred place to explore open contribution
        opportunities without creating a formal issue.

  - type: textarea
    id: topic
    attributes:
      label: Topic / Area
      description: What area of the project does this relate to? (e.g., statistics, visualization, docs)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What Help Is Needed
      description: Describe the work that needs to be done and why it matters.
    validations:
      required: true

  - type: textarea
    id: getting_started
    attributes:
      label: Getting Started
      description: |
        Pointers to relevant code, files, or documentation that would help a new contributor
        understand the problem and get started.
      placeholder: |
        - Relevant file: `src/jquantstats/_stats.py`
        - Related issue: #XX
        - Reference implementation: ...

  - type: dropdown
    id: skill_level
    attributes:
      label: Skill Level
      description: Estimated difficulty or experience level required.
      options:
        - Beginner-friendly
        - Intermediate
        - Advanced
    validations:
      required: true
