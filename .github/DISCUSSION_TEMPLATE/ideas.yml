title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a feature idea or want to propose a change? Share it here before opening a pull request.
        This is the right place to float RFCs, brainstorm enhancements, or gauge interest in new directions.

  - type: textarea
    id: idea
    attributes:
      label: Your Idea or Proposal
      description: Describe your idea clearly. What problem does it solve? What should it do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this valuable? What use-case or pain-point does it address?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there existing ways to achieve this today? What are their limitations?

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, papers, libraries, or prior art.
