site_name: jquantstats
site_description: Quantitative financial analysis tools for Python
site_url: https://tschm.github.io/jquantstats/
repo_url: https://github.com/tschm/jquantstats
repo_name: tschm/jquantstats

docs_dir: ../docs
site_dir: ../_mkdocs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

extra:
  version:
    provider: mike

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../src
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Marimo Notebooks: notebooks.md
  - Reports: reports.md
  - API Reference: api.md
