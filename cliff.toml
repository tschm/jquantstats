# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Usage:
#   git cliff --output CHANGELOG.md           # regenerate the full changelog
#   git cliff --unreleased --tag v0.2.0       # preview the next release section
#   git cliff --latest --output CHANGELOG.md  # update with the latest tag only
#
# Run via Make:  make changelog

[changelog]
# Template for the header of the changelog (prepended once)
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

<!-- git-cliff: generate entries below this line -->
"""

# Tera template for each release section
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first | trim_end_matches(pat=".") }}\
{% if commit.breaking %} (**BREAKING**){% endif %}
{%- endfor %}
{% endfor %}\n
"""

# Remove trailing whitespace from the rendered body
trim = true

# Render the footer with comparison links
footer = """
{% for release in releases %}\
{% if release.version %}\
{% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/jebel-quant/jquantstats/compare/{{ release.previous.version }}...{{ release.version }}
{% else %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/jebel-quant/jquantstats/releases/tag/{{ release.version }}
{% endif %}\
{% else %}\
[Unreleased]: https://github.com/jebel-quant/jquantstats/compare/{{ releases | map(attribute="version") | select | first }}...HEAD
{% endif %}\
{% endfor %}
"""

[git]
# Parse conventional commits (https://www.conventionalcommits.org/)
conventional_commits = true
filter_unconventional = false
split_commits = false

# Map conventional commit types to changelog sections
commit_parsers = [
  { message = "^feat", group = "New Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc|^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Maintenance" },
  { message = "^style", group = "Maintenance" },
  { message = "^chore", group = "Maintenance" },
  { message = "^build|^ci", group = "Maintenance" },
  { message = "^test", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
  { message = ".*", group = "Other Changes" },
]

# Commits matching these patterns are excluded from the changelog
commit_preprocessors = [
  { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/jebel-quant/jquantstats/issues/${1}))" },
]

# Protect breaking changes from being filtered
protect_breaking_commits = true

# Filter out commits tagged ignore-for-changelog
filter_commits = false

# Use the latest annotated tag
tag_pattern = "v[0-9].*"

# Skip untagged commits from showing as [Unreleased] when none exist yet
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
