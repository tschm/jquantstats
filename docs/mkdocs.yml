site_name: jquantstats
site_description: Quantitative financial analysis tools for Python
site_url: https://tschm.github.io/jquantstats/
repo_url: https://github.com/tschm/jquantstats
repo_name: tschm/jquantstats

docs_dir: .

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../src
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true

nav:
  - Home: index.md
  - Reference:
      - build_data: reference/api.md
      - Data: reference/data.md
      - Stats: reference/stats.md
      - Plots: reference/plots.md
      - Reports: reference/reports.md
      - Portfolio: reference/portfolio.md
