INHERIT: docs/mkdocs-base.yml

site_name: jquantstats
site_description: Quantitative financial analysis tools for Python
site_url: https://jebel-quant.github.io/jquantstats/
repo_url: https://github.com/jebel-quant/jquantstats
repo_name: jebel-quant/jquantstats

docs_dir: docs

extra:
  version:
    provider: mike

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Marimo Notebooks: notebooks.md
  - Reports: reports.md
  - Cost Models: cost_models.md
  - API Reference: api.md
  - Docs:
    - Migration Guide: MIGRATION.md
    - API Stability: STABILITY.md
  
