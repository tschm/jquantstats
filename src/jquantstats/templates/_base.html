<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block page_title %}JQuantStats Report{% endblock %}</title>
  <style>
/* ── Reset & Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    line-height: 1.6;
}

/* ── Header ───────────────────────────────────────── */
.report-header {
    background: linear-gradient(135deg, #1a1f35 0%, #0d1b2a 100%);
    border-bottom: 2px solid #2d3748;
    padding: 2.5rem 2rem 2rem;
}
.report-header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #63b3ed;
    letter-spacing: -0.5px;
}
.report-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin-top: 0.75rem;
    font-size: 0.875rem;
    color: #a0aec0;
}
.report-meta span strong { color: #e2e8f0; }

/* ── Table of Contents ────────────────────────────── */
.toc {
    background: #1a1f35;
    border-bottom: 1px solid #2d3748;
    padding: 0.75rem 2rem;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-size: 0.8rem;
    position: sticky;
    top: 0;
    z-index: 100;
}
.toc a {
    color: #63b3ed;
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.2s;
}
.toc a:hover { opacity: 1; text-decoration: underline; }

/* ── Main Content ─────────────────────────────────── */
.container {
    max-width: {{ container_max_width }};
    margin: 0 auto;
    padding: 2rem;
}

/* ── Sections ─────────────────────────────────────── */
.section { margin-bottom: 3rem; }
.section-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: #90cdf4;
    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #2d3748;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.section-title::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 1.2em;
    background: #4299e1;
    border-radius: 2px;
}

/* ── Chart Card ───────────────────────────────────── */
.chart-card {
    background: #1a202c;
    border: 1px solid #2d3748;
    border-radius: 12px;
    padding: 1rem;
    overflow: hidden;
}
.chart-card .js-plotly-plot,
.chart-card .plotly-graph-div { width: 100% !important; }
.chart-unavailable {
    color: #a0aec0;
    font-style: italic;
    padding: 1rem;
}

/* ── Footer ───────────────────────────────────────── */
.report-footer {
    text-align: center;
    padding: 1.5rem;
    color: #4a5568;
    font-size: 0.75rem;
    border-top: 1px solid #2d3748;
    margin-top: 3rem;
}

{% block extra_css %}{% endblock %}
  </style>
</head>
<body>

{% block header %}{% endblock %}

{% block nav %}{% endblock %}

<div class="container">
{% block content %}{% endblock %}
</div>

<footer class="report-footer">
  {% block footer %}Generated by <strong>jquantstats</strong>{% endblock %}
</footer>

</body>
</html>
